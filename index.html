<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Care Routine</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #ff85a2;
            --primary-hover: #f17390;
            --success: #4caf50;
            --danger: #f44336;
            --bg: #fff5f7;
            --card-bg: #ffffff;
            --text: #4a4a4a;
            --border: #f0d5da;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 650px;
            width: 100%;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(255, 133, 162, 0.15);
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        /*h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 5px;
            font-size: 24px;
        }
*\
        .subtitle {
            text-align: center;
            color: #a07883;
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        /* واجهة تسجيل الدخول */
        .auth-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #fff0f3;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .auth-box h3 { margin: 0 0 5px 0; color: #d65a78; font-size: 16px; }
        .auth-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .auth-row input { flex: 1; min-width: 140px; padding: 8px; border: 1px solid var(--border); border-radius: 6px; }
        
        .user-logged-in {
            display: none;
            justify-content: space-between;
            align-items: center;
            background: #e8f5e9;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 13px;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }

        .filter-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
            background: #fffafb;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .filter-section label { font-size: 14px; font-weight: bold; color: #d65a78; }
        .filter-section select {
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border);
            font-size: 15px; font-family: inherit; color: var(--text); outline: none; cursor: pointer;
        }

        /* قسم إضافة مهمة جديدة */
        .add-task-box {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            background: #fffafb;
            padding: 10px;
            border: 1px dashed var(--primary);
            border-radius: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .add-task-box select, .add-task-box input {
            padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit;
        }
        .add-task-box input { flex: 2; min-width: 180px; }
        .add-task-box select { flex: 1; min-width: 120px; }

        /* حل مشكلة تداخل النصوص الطويلة */
        .day-section {
            background: #fffcfd; border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .day-header { background-color: var(--primary); color: white; padding: 12px 15px; font-size: 18px; font-weight: bold; }
        .routines-container { padding: 5px 10px; }

        .routine-row {
            display: flex; flex-direction: column; padding: 15px 5px; border-bottom: 1px dashed var(--border);
        }
        .routine-row:last-child { border-bottom: none; }

        /* تعديل توزيع العناصر لمنع التداخل */
        .routine-info {
            display: flex; justify-content: space-between; align-items: flex-start; gap: 15px;
        }

        .routine-text-block {
            display: flex; flex-direction: column; gap: 6px; flex: 1; word-break: break-word; min-width: 0;
        }

        .category-tag-container { display: flex; }
        .category-name {
            font-weight: bold; color: #d65a78; font-size: 11px; background: #ffebee; padding: 3px 8px; border-radius: 20px; white-space: nowrap;
        }

        .content-text { font-size: 15px; color: #444; line-height: 1.5; margin: 0; word-wrap: break-word; }

        .action-buttons {
            display: flex; gap: 6px; align-items: center; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; max-width: 240px;
        }

        .btn {
            border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.2s; background: #eee; color: #666; font-family: inherit;
        }
        .btn-check.active { background-color: var(--success); color: white; }
        .btn-cross.active { background-color: var(--danger); color: white; }
        .btn-edit { background-color: #ffe0b2; color: #e65100; }
        .btn-delete { background-color: #ffcdd2; color: #b71c1c; }

        .reason-area { display: none; margin-top: 10px; }
        .reason-area input {
            width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ffccd5; border-radius: 6px; background-color: #fff0f3; font-size: 13px; font-family: inherit;
        }

        .notification-bar {
            background: #fff; border: 1px solid var(--border); padding: 8px; border-radius: 10px; margin-bottom: 15px; text-align: center; width: 100%; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✨ لوحة جدول عنايتي الشخصية ✨</h1>
    <p class="subtitle">مساحتك الذكية لتنظيم روتينك✨  </p>

    <div id="authSection" class="auth-box">
        <h3>🔐لحفظ مهامك</h3>
        <div class="auth-row">
            <input type="email" id="authEmail" placeholder="البريد الإلكتروني...">
            <input type="password" id="authPassword" placeholder="كلمة المرور...">
            <button onclick="handleSignUp()" class="btn" style="background:#b3e5fc; color:#01579b;">إنشاء حساب</button>
            <button onclick="handleLogin()" class="btn" style="background:var(--primary); color:white;">تسجيل دخول</button>
        </div>
    </div>
    <div id="userInfoSection" class="user-logged-in">
        <span id="userEmailDisplay">تم تسجيل الدخول بنجاح 🌐</span>
        <button onclick="handleLogout()" class="btn" style="padding:4px 8px; font-size:11px; background:#ffcdd2; color:#b71c1c;">تسجيل خروج</button>
    </div>

    <div class="notification-bar">
        <button id="notiBtn" onclick="requestPermission()" style="background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 13px;">تفعيل التنبيهات اليومية 🔔</button>
    </div>

    <div class="filter-section">
        <label for="daySelect">📅 استعراض وإدارة مهام يوم:</label>
        <select id="daySelect" onchange="changeDayFilter(this.value)">
            <option value="السبت">السبت</option>
            <option value="الأحد">الأحد</option>
            <option value="الإثنين">الإثنين</option>
            <option value="الثلاثاء">الثلاثاء</option>
            <option value="الأربعاء">الأربعاء</option>
            <option value="الخميس">الخميس</option>
            <option value="الجمعة">الجمعة</option>
        </select>
    </div>

    <div class="add-task-box">
        <select id="newCatSelect" onchange="checkCategorySelection(this.value)">
            </select>
        <input type="text" id="newContent" placeholder="اكتبي روتين جديد هنا...">
        <button onclick="addNewRoutine()" style="background: var(--primary); color:white; border:none; padding:10px 14px; border-radius:8px; cursor:pointer; font-weight:bold; font-family:inherit;">＋ إضافة مهمة</button>
    </div>

    <div id="schedule"></div>
</div>

<script>
    // تكوين السوبابيس (Supabase) لحفظ البيانات سحابياً
    // تنبيه: للحصول على حفظ حقيقي، يفضل لاحقاً استبدال هذه القيم بقيم مشروعك الخاص من موقع supabase.com المتاحة مجاناً
    const SUPABASE_URL = "https://your-project-url.supabase.co"; 
    const SUPABASE_KEY = "your-anon-key";
    const supabase = (SUPABASE_URL !== "https://your-project-url.supabase.co") ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

    const emptyCareData = [
        { day: "السبت", routines: [] }, { day: "الأحد", routines: [] }, { day: "الإثنين", routines: [] },
        { day: "الثلاثاء", routines: [] }, { day: "الأربعاء", routines: [] }, { day: "الخميس", routines: [] }, { day: "الجمعة", routines: [] }
    ];

    const defaultCategories = ["العناية الصباحية", "العناية بالشعر", "العناية المسائية", "الرياضية"];

    let careData = JSON.parse(localStorage.getItem('myCustomCareData')) || emptyCareData;
    let categories = JSON.parse(localStorage.getItem('myCareCategories')) || defaultCategories;
    let userProgress = JSON.parse(localStorage.getItem('userCareProgress_2026')) || {};
    let selectedDay = "";
    let currentUser = null;

    document.addEventListener('DOMContentLoaded', () => {
        initAuthCheck();
        updateCategorySelect();
        setInitialDay();
        checkNotificationStatus();
        setupDailyCheck();
    });

    // إدارة الحساب والمزامنة السحابية
    function initAuthCheck() {
        if (!supabase) return;
        supabase.auth.getSession().then(({ data: { session } }) => {
            handleSessionChange(session);
        });
        supabase.auth.onAuthStateChange((_event, session) => {
            handleSessionChange(session);
        });
    }

    function handleSessionChange(session) {
        if (session) {
            currentUser = session.user;
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('userInfoSection').style.display = 'flex';
            document.getElementById('userEmailDisplay').innerText = `☁️ متصل سحابياً: ${currentUser.email}`;
            pullDataFromCloud();
        } else {
            currentUser = null;
            document.getElementById('authSection').style.display = 'flex';
            document.getElementById('userInfoSection').style.display = 'none';
        }
    }

    async function handleSignUp() {
        if (!supabase) { alert("الرجاء إعداد روابط Supabase أولاً لتفعيل التخزين السحابي!"); return; }
        const email = document.getElementById('authEmail').value.trim();
        const password = document.getElementById('authPassword').value;
        if (!email || !password) { alert("أدخلي البريد والرقم السري أولاً!"); return; }
        
        const { error } = await supabase.auth.signUp({ email, password });
        if (error) alert("خطأ في إنشاء الحساب: " + error.message);
        else alert("تم إنشاء الحساب بنجاح! افحصي بريدك لتأكيده التفعيل إذا تطلب الأمر.");
    }

    async function handleLogin() {
        if (!supabase) { alert("الرجاء إعداد روابط Supabase أولاً لتفعيل التخزين السحابي!"); return; }
        const email = document.getElementById('authEmail').value.trim();
        const password = document.getElementById('authPassword').value;
        
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) alert("فشل تسجيل الدخول: " + error.message);
    }

    async function handleLogout() {
        if (supabase) await supabase.auth.signOut();
        localStorage.removeItem('myCustomCareData');
        localStorage.removeItem('userCareProgress_2026');
        careData = emptyCareData;
        userProgress = {};
        renderSchedule();
    }

    // دفع البيانات للسحاب وحفظها
    async function pushDataToCloud() {
        if (!supabase || !currentUser) return;
        await supabase.from('user_routines').upsert({
            user_id: currentUser.id,
            care_data: careData,
            user_progress: userProgress,
            categories: categories,
            updated_at: new Date()
        });
    }

    // جلب البيانات من السحاب عند الدخول من جهاز آخر
    async function pullDataFromCloud() {
        if (!supabase || !currentUser) return;
        const { data, error } = await supabase.from('user_routines').select('*').eq('user_id', currentUser.id).single();
        if (data && !error) {
            careData = data.care_data || emptyCareData;
            userProgress = data.user_progress || {};
            categories = data.categories || defaultCategories;
            localStorage.setItem('myCustomCareData', JSON.stringify(careData));
            localStorage.setItem('userCareProgress_2026', JSON.stringify(userProgress));
            localStorage.setItem('myCareCategories', JSON.stringify(categories));
            updateCategorySelect();
            renderSchedule();
        }
    }

    // تحديث خيارات الأقسام وإدماج خيار "قسم آخر" ذكياً
    function updateCategorySelect() {
        const select = document.getElementById('newCatSelect');
        select.innerHTML = '';
        
        categories.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat;
            opt.innerText = cat.replace("العناية ", "");
            select.appendChild(opt);
        });

        // خيار ذكي مدمج لإضافة قسم جديد بدون زحمة واجهات
        const promptOpt = document.createElement('option');
        promptOpt.value = "__NEW_CAT__";
        promptOpt.innerText = "➕ قسم آخر...";
        promptOpt.style.color = "#d65a78";
        promptOpt.style.fontWeight = "bold";
        select.appendChild(promptOpt);
    }

    function checkCategorySelection(value) {
        if (value === "__NEW_CAT__") {
            const newCatName = prompt("اكتبي اسم القسم الجديد المخصص (مثال: العناية بالجسم، الفيتامينات):");
            if (newCatName && newCatName.trim() !== "") {
                const trimmed = newCatName.trim();
                if (!categories.includes(trimmed)) {
                    categories.push(trimmed);
                    localStorage.setItem('myCareCategories', JSON.stringify(categories));
                    updateCategorySelect();
                    document.getElementById('newCatSelect').value = trimmed;
                    pushDataToCloud();
                } else {
                    alert("هذا القسم مضاف سابقاً بالفعل!");
                    document.getElementById('newCatSelect').selectedIndex = 0;
                }
            } else {
                document.getElementById('newCatSelect').selectedIndex = 0;
            }
        }
    }

    function setInitialDay() {
        const currentDayIndex = new Date().getDay(); 
        const jsDays = ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
        const todayName = jsDays[currentDayIndex];
        selectedDay = todayName;
        document.getElementById('daySelect').value = todayName;
        renderSchedule();
    }

    function changeDayFilter(day) {
        selectedDay = day;
        renderSchedule();
    }

    function renderSchedule() {
        const scheduleDiv = document.getElementById('schedule');
        scheduleDiv.innerHTML = '';

        const dayIdx = careData.findIndex(d => d.day === selectedDay);
        if (dayIdx === -1) return;

        const dayData = careData[dayIdx];
        const dayBox = document.createElement('div');
        dayBox.className = 'day-section';
        
        let routinesHtml = '';
        if(dayData.routines.length === 0) {
            routinesHtml = `<p style="text-align:center; color:#999; padding: 25px; font-size:14px;">لا توجد مهام مضافة ليوم (${selectedDay}) حتى الآن.<br>أضيفي روتينكِ الخاص باستخدام الصندوق في الأعلى! ✨</p>`;
        }

        dayData.routines.forEach((routine, rIdx) => {
            const uniqueId = `${selectedDay}_${rIdx}`;
            const currentStatus = userProgress[uniqueId]?.status || null;
            const currentReason = userProgress[uniqueId]?.reason || '';

            // واجهة مصلحة ومتجاوبة لتفادي تداخل النصوص الطويلة
            routinesHtml += `
                <div class="routine-row">
                    <div class="routine-info">
                        <div class="routine-text-block">
                            <div class="category-tag-container">
                                <span class="category-name">${routine.cat}</span>
                            </div>
                            <p class="content-text">${routine.content}</p>
                        </div>
                        <div class="action-buttons">
                            <button class="btn btn-check ${currentStatus === 'success' ? 'active' : ''}" onclick="toggleStatus('${uniqueId}', 'success')">✓ صح</button>
                            <button class="btn btn-cross ${currentStatus === 'danger' ? 'active' : ''}" onclick="toggleStatus('${uniqueId}', 'danger')">✗ خطأ</button>
                            <button class="btn btn-edit" onclick="editRoutine(${dayIdx}, ${rIdx})">تعديل</button>
                            <button class="btn btn-delete" onclick="deleteRoutine(${dayIdx}, ${rIdx})">حذف</button>
                        </div>
                    </div>
                    <div class="reason-area" id="reason-container-${uniqueId}" style="display: ${currentStatus === 'danger' ? 'block' : 'none'}">
                        <input type="text" id="input-${uniqueId}" placeholder="اكتبي سبب عدم الإتمام هنا..." value="${currentReason}" onchange="saveReason('${uniqueId}', this.value)">
                    </div>
                </div>
            `;
        });

        dayBox.innerHTML = `
            <div class="day-header"><span>📅 مهام يوم ${dayData.day}</span></div>
            <div class="routines-container">${routinesHtml}</div>
        `;
        scheduleDiv.appendChild(dayBox);
    }

    function addNewRoutine() {
        const catSelect = document.getElementById('newCatSelect').value;
        const contentInput = document.getElementById('newContent').value.trim();

        if(!contentInput || catSelect === "__NEW_CAT__") {
            alert("الرجاء كتابة تفاصيل المهمة وتحديد القسم!");
            return;
        }

        const dayIdx = careData.findIndex(d => d.day === selectedDay);
        careData[dayIdx].routines.push({ cat: catSelect, content: contentInput });

        saveAllData();
        renderSchedule();
        document.getElementById('newContent').value = ''; 
    }

    function editRoutine(dayIdx, rIdx) {
        const currentContent = careData[dayIdx].routines[rIdx].content;
        const newContent = prompt("عدلي نص المهمة:", currentContent);
        if (newContent !== null && newContent.trim() !== "") {
            careData[dayIdx].routines[rIdx].content = newContent.trim();
            saveAllData();
            renderSchedule();
        }
    }

    function deleteRoutine(dayIdx, rIdx) {
        if(confirm("هل أنتِ متأكدة من حذف هذه المهمة؟")) {
            careData[dayIdx].routines.splice(rIdx, 1);
            saveAllData();
            renderSchedule();
        }
    }

    function saveAllData() {
        localStorage.setItem('myCustomCareData', JSON.stringify(careData));
        pushDataToCloud();
    }

    function toggleStatus(id, type) {
        if (!userProgress[id]) userProgress[id] = { status: null, reason: '' };
        userProgress[id].status = (userProgress[id].status === type) ? null : type;
        if (userProgress[id].status !== 'danger') userProgress[id].reason = '';
        localStorage.setItem('userCareProgress_2026', JSON.stringify(userProgress));
        pushDataToCloud();
        renderSchedule();
    }

    function saveReason(id, value) {
        if (userProgress[id]) {
            userProgress[id].reason = value;
            localStorage.setItem('userCareProgress_2026', JSON.stringify(userProgress));
            pushDataToCloud();
        }
    }

    function requestPermission() {
        if ("Notification" in window) {
            Notification.requestPermission().then(permission => {
                if (permission === "granted") { checkNotificationStatus(); }
            });
        }
    }

    function checkNotificationStatus() {
        if ("Notification" in window && Notification.permission === "granted") {
            document.getElementById('notiBtn').innerText = "🔔 التنبيهات نشطة اليوم";
            document.getElementById('notiBtn').style.backgroundColor = "#4caf50";
            document.getElementById('notiBtn').disabled = true;
        }
    }

    function setupDailyCheck() {
        setInterval(() => {
            const now = new Date();
            if ((now.getHours() === 10 || now.getHours() === 20) && now.getMinutes() === 0) {
                if ("Notification" in window && Notification.permission === "granted") {
                    new Notification("🌸 وقت العناية! 🌸", { body: "تذكرتك اليومية للاطلاع على مهام عنايتك وإتمامها ✨" });
                }
            }
        }, 60000);
    }
</script>

</body>
</html>
