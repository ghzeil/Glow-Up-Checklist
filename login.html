<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔒 تسجيل الدخول والمزامنة</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --rose: #E8647A; --rose-light: #F4A0AE; --blush: #FDE8EC; --blush-mid: #FACCCE;
      --white: #FFFFFF; --text: #3D2930; --text-soft: #7D5A62; --sky: #5BA3D4; --radius: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: linear-gradient(145deg, #FFF0F3 0%, #FFF8F9 50%, #F9F0FF 100%);
      min-height: 100vh; color: var(--text); display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .login-card {
      background: var(--white); border-radius: var(--radius); padding: 35px 24px;
      box-shadow: 0 4px 20px rgba(232,100,122,0.13); width: 100%; max-width: 400px; text-align: center;
    }
    h2 { color: var(--rose); font-weight: 800; font-size: 1.5rem; margin-bottom: 8px; }
    p { font-size: 0.88rem; color: var(--text-soft); margin-bottom: 24px; }
    .auth-fields { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
    .auth-fields input {
      padding: 12px 14px; border: 1.5px solid var(--blush-mid); border-radius: 8px;
      font-family: inherit; font-size: 0.9rem; outline: none; text-align: right; color: var(--text);
    }
    .auth-fields input:focus { border-color: var(--rose-light); }
    .auth-btns { display: flex; flex-direction: column; gap: 10px; }
    .btn-primary { background: var(--rose); color: #fff; border: none; border-radius: 8px; padding: 12px; font-family: inherit; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    .btn-secondary { background: var(--sky); color: #fff; border: none; border-radius: 8px; padding: 12px; font-family: inherit; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    .btn-primary:hover, .btn-secondary:hover { opacity: 0.9; }
    .back-link { display: inline-block; margin-top: 20px; color: var(--text-soft); text-decoration: none; font-size: 0.85rem; }
    #auth-status { font-size: 0.88rem; margin-top: 14px; min-height: 20px; font-weight: 600; line-height: 1.5; }
  </style>
</head>
<body>

<div class="login-card">
  <h2>🔒 حساب العناية السحابي</h2>
  <p>سجلي دخولك أو أنشئي حساباً لحفظ مهام روتينك ومزامنتها تلقائياً سحابياً ✨</p>

  <div class="auth-fields">
    <input type="email" id="auth-email" placeholder="البريد الإلكتروني..." />
    <input type="password" id="auth-pass" placeholder="كلمة المرور..." onkeydown="if(event.key==='Enter') handleAuth('signIn')" />
  </div>

  <div class="auth-btns">
    <button class="btn-primary" onclick="handleAuth('signIn')">تسجيل الدخول</button>
    <button class="btn-secondary" onclick="handleAuth('signUp')">إنشاء حساب جديد</button>
  </div>

  <div id="auth-status"></div>
  <a href="index.html" class="back-link">← العودة لجدول المهام بدون تسجيل</a>
</div>

<script>
// ⚠️ تأكدي من استبدال المفتاح الفعلي الممتد الطويل هنا ليعمل الاتصال بنجاح
const SUPABASE_URL = 'https://pbtkanzfmxlhabcukywy.supabase.co'; 
const SUPABASE_ANON = 'sb_publishable_fX7lY5EZX2xcI8C31yGssQ_zjr8pwAc'; 

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

async function handleAuth(type) {
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-pass').value;
  const status = document.getElementById('auth-status');
  
  if (!email || !pass) { 
    status.style.color = 'red'; 
    status.textContent = '✏️ أدخلي البريد وكلمة المرور أولاً'; 
    return; 
  }
  
  status.style.color = 'var(--text)';
  status.textContent = type === 'signIn' ? '🔒 جاري التحقق وتسجيل الدخول...' : '☁️ جاري تهيئة حسابك الجديد...';

  try {
    const { data, error } = type === 'signIn' 
      ? await supabaseClient.auth.signInWithPassword({ email, password: pass })
      : await supabaseClient.auth.signUp({ email, password: pass });

    if (error) {
      status.style.color = 'red';
      // ترجمة الأخطاء الشائعة لتجربة مستخدم أفضل
      if (error.message.includes("Invalid login credentials")) {
        status.textContent = '❌ خطأ: البريد الإلكتروني أو كلمة المرور غير صحيحة.';
      } else if (error.message.includes("Email not confirmed")) {
        status.textContent = '⚠️ يرجى تأكيد حسابك من خلال الرابط المرسل لبريدك الإلكتروني أولاً.';
      } else {
        status.textContent = '❌ خطأ: ' + error.message;
      }
    } else {
      status.style.color = 'green';
      if (type === 'signIn') {
        status.textContent = '🎉 تم تسجيل الدخول بنجاح! جاري الانتقال لجدولك الخاص...';
        setTimeout(() => { window.location.href = 'index.html'; }, 1200);
      } else {
        // إذا كان تفعيل البريد إجبارياً في إعدادات Supabase
        status.textContent = '✉️ تم إنشاء الحساب بنجاح! يرجى مراجعة بريدك الإلكتروني لتأكيد التفعيل والدخول.';
      }
    }
  } catch (err) {
    status.style.color = 'red';
    status.textContent = '⚠️ حدث خطأ أثناء الاتصال بالسيرفر.';
    console.error(err);
  }
}
</script>
</body>
</html>
